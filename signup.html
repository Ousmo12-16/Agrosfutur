<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — AgroFutur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🌱 Agro<span>Futur</span></div>

    <!-- FORMULAIRE D'INSCRIPTION -->
    <form id="signup-form" onsubmit="handleSignup(event)">
      <h2>Créer un compte</h2>
      <p class="subtitle">Rejoignez la communauté AgroFutur en quelques secondes.</p>

      <div class="form-group">
        <label for="signup-name">Nom complet</label>
        <input type="text" id="signup-name" placeholder="Ex : Awa Konaté" required>
      </div>

      <div class="form-group">
        <label for="signup-email">Adresse e-mail</label>
        <input type="email" id="signup-email" placeholder="vous@exemple.com" required>
      </div>

      <div class="form-group">
        <label for="signup-password">Mot de passe</label>
        <input type="password" id="signup-password" placeholder="8 caractères minimum" minlength="8" required>
      </div>

      <button type="submit" class="auth-submit">Créer mon compte</button>

      <div class="auth-divider">ou continuer avec</div>

      <div class="social-buttons">
        <button type="button" class="btn-social" onclick="loginWithProvider('google')">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.14c-.22-.69-.35-1.43-.35-2.14s.13-1.45.35-2.14V7.02H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.98l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.02l3.66 2.84c.87-2.6 3.3-4.48 6.16-4.48z"/></svg>
          Continuer avec Google
        </button>
        <button type="button" class="btn-social" onclick="loginWithProvider('apple')">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M16.365 1.43c.07 1.083-.319 2.026-.99 2.776-.69.78-1.66 1.39-2.74 1.31-.08-1.05.36-2.09 1.02-2.83.7-.78 1.83-1.36 2.71-1.26zM20.5 17.13c-.5 1.13-1.13 2.23-2 3.18-.77.84-1.62 1.66-2.78 1.68-1.12.02-1.49-.66-2.78-.66-1.29 0-1.7.64-2.75.68-1.11.04-1.97-.85-2.74-1.69-1.5-1.64-2.66-4.64-2.18-7.05.36-1.84 1.43-3.39 2.99-4.16 1.18-.58 2.47-.5 3.55.08.65.36 1.32.55 2.04.55.69 0 1.31-.18 1.97-.55 1.16-.62 2.5-.7 3.7-.06 1.07.57 1.94 1.55 2.4 2.74-2.16 1.12-3.38 3.84-2.42 6.26z"/></svg>
          Continuer avec Apple
        </button>
      </div>

      <p id="signup-message" class="auth-message"></p>

      <div class="auth-footer">
        Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </form>

    <!-- FORMULAIRE DE VÉRIFICATION DU CODE -->
    <form id="verify-form" onsubmit="handleVerifyCode(event)">
      <h2>Vérifiez votre e-mail</h2>
      <p class="subtitle">Entrez le code à 6 chiffres envoyé à votre adresse e-mail.</p>

      <div class="form-group">
        <label for="verify-code">Code de vérification</label>
        <input type="text" id="verify-code" class="code-input" maxlength="6" placeholder="------" required>
      </div>

      <button type="submit" class="auth-submit">Vérifier</button>

      <p id="verify-message" class="auth-message"></p>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
</body>
</html>
